            "DisplayName" : "ScheduleDuo von Peter",
            "ShortDescription" : "Schalten von Beleuchtungen entsprechend der Daten (2 getrennte Zeitbereiche A und B)",
            "DetailedDescription" : "Dieser Plan gibt die Rahmenbedingungen vor zum Schalten von Beleuchtungen. Sie basiert auf der Tag-/Nacht-Schaltung der MLL mit 'Abends' (SunSet) und 'Morgens' (SunRise). Die Schaltzeit wird allerdings in Form der Uhrzeit (0 Uhr 00 bis 23 Uhr 59) eingegeben. Minimaler Abstand zwischen ein und aus sind 3 Minuten! Mit dem Zufalls-Tick wird bestimmt, in welchem Bereich der Zufall wirken soll (0 - 99 Ticks, entspricht 0 - 300 Minuten). Geschaltet werden die Ausgangsvariablen 'Zielvariable 1' bis 'Letzte Zielvariable' (z.B. Haus1 bis Haus5). Es gibt hier 2 Schaltungen (A und B) um z.B. abends und morgens mit einem Aufruf zu definieren. Eine logische Pruefung der Schaltzeiten erfolgt nicht!",
            "LEDs" : "",
			"InCount" : "0",
            "OutCnt" : "n2"
        }
